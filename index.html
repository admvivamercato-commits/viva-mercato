
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viva Mercato — Tutoriais Internos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1a4d2e;
  --green-mid: #2d6a4f;
  --green-light: #c8e6c9;
  --green-accent: #52b788;
  --cream: #f8f5ef;
  --cream-dark: #ede9e0;
  --text: #1c1c1c;
  --text-muted: #5a5a5a;
  --text-faint: #999;
  --border: rgba(0,0,0,0.1);
  --card-bg: #ffffff;
  --warning-bg: #fffbeb;
  --warning-border: #f59e0b;
  --warning-text: #78350f;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--green-dark);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--green-accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: #fff;
}
.logo-text {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: #fff;
  letter-spacing: 0.3px;
}
.logo-text span { color: var(--green-accent); }
.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 1px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.edit-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all .2s;
}
.edit-toggle:hover { background: rgba(255,255,255,0.18); }
.edit-toggle.active { background: var(--green-accent); border-color: var(--green-accent); color: #fff; }
.edit-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4ade80;
  display: none;
  animation: pulse 1.5s infinite;
}
.edit-toggle.active .edit-dot { display: block; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* EDIT BAR */
.edit-bar {
  background: #fffbeb;
  border-bottom: 1px solid #fde68a;
  padding: 8px 2rem;
  font-size: 13px;
  color: #78350f;
  display: none;
  align-items: center;
  gap: 8px;
}
.edit-bar.show { display: flex; }
.edit-bar svg { flex-shrink: 0; }

/* LAYOUT */
.layout {
  display: flex;
  min-height: calc(100vh - 64px);
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 1.5rem 0;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 0 1.25rem 0.75rem;
}
.tab-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 10px 1.25rem;
  border: none;
  background: transparent;
  text-align: left;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-muted);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .15s;
}
.tab-btn:hover { background: var(--cream); color: var(--text); }
.tab-btn.active {
  background: #f0faf4;
  color: var(--green-dark);
  border-left-color: var(--green-dark);
  font-weight: 500;
}
.tab-btn .tab-icon { margin-right: 8px; font-size: 16px; }
.tab-edit-btn {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--cream);
  border: 1px solid var(--border);
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 12px;
  flex-shrink: 0;
}
.tab-edit-btn:hover { background: var(--cream-dark); }
.edit-mode .tab-edit-btn { display: flex; }
.add-section-btn {
  display: none;
  align-items: center;
  gap: 8px;
  width: calc(100% - 2.5rem);
  margin: 0.5rem 1.25rem 0;
  padding: 8px 14px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-faint);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all .15s;
}
.add-section-btn:hover { background: var(--cream); color: var(--text-muted); }
.edit-mode .add-section-btn { display: flex; }

/* MAIN */
.main { flex: 1; padding: 2rem; max-width: 900px; }

.sec-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1.5rem;
}
.sec-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  color: var(--green-dark);
  line-height: 1.2;
}
.sec-desc {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 4px;
}
.edit-sec-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: #fff;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-muted);
  cursor: pointer;
  flex-shrink: 0;
  margin-left: 1rem;
}
.edit-sec-btn:hover { background: var(--cream); }
.edit-mode .edit-sec-btn { display: flex; }

/* STEPS GRID */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}
.step-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.2rem 1rem;
  position: relative;
  transition: box-shadow .2s, transform .2s;
}
.step-card:hover { box-shadow: var(--shadow); }
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #e8f5e9;
  color: var(--green-dark);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  margin-bottom: 10px;
  font-family: 'DM Serif Display', serif;
}
.step-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.step-body {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  white-space: pre-line;
}
.alert-box {
  display: flex;
  gap: 8px;
  background: var(--warning-bg);
  border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--warning-text);
  line-height: 1.5;
}
.alert-box svg { flex-shrink: 0; margin-top: 1px; }
.card-edit-btn {
  position: absolute;
  top: 10px; right: 10px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text-muted);
  display: none;
  font-family: 'DM Sans', sans-serif;
}
.card-edit-btn:hover { background: var(--cream-dark); }
.edit-mode .card-edit-btn { display: block; }

.add-step-card {
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 1.1rem;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  color: var(--text-faint);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  min-height: 80px;
  transition: all .15s;
}
.add-step-card:hover { background: var(--cream); color: var(--text-muted); }
.edit-mode .add-step-card { display: flex; }

.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-faint);
  font-size: 14px;
}
.empty-state p { margin-top: 8px; font-size: 13px; }

/* MODAL */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 1.75rem;
  width: min(500px, 100%);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--green-dark);
  margin-bottom: 1.25rem;
}
.field { margin-bottom: 14px; }
.field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input, .field textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--cream);
  resize: vertical;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus {
  outline: none;
  border-color: var(--green-accent);
}
.field textarea { min-height: 90px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}
.btn {
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  border: none;
  font-weight: 500;
  transition: all .15s;
}
.btn-cancel { background: var(--cream); color: var(--text-muted); border: 1px solid var(--border); }
.btn-cancel:hover { background: var(--cream-dark); }
.btn-save { background: var(--green-dark); color: #fff; }
.btn-save:hover { background: var(--green-mid); }
.btn-danger { background: #fee2e2; color: #991b1b; margin-right: auto; }
.btn-danger:hover { background: #fca5a5; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--green-dark);
  color: #fff;
  padding: 9px 22px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all .25s;
  z-index: 300;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* RESPONSIVE */
@media (max-width: 640px) {
  .sidebar { display: none; }
  .main { padding: 1.25rem; }
  .steps-grid { grid-template-columns: 1fr; }
  .header { padding: 0 1rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">V</div>
    <div>
      <div class="logo-text"><span>viva</span> mercato</div>
      <div class="logo-sub">Tutoriais internos</div>
    </div>
  </div>
  <div class="header-right">
    <button class="edit-toggle" id="editToggle" onclick="toggleEdit()">
      <div class="edit-dot"></div>
      <span id="editLabel">✏️ Editar</span>
    </button>
  </div>
</div>

<div class="edit-bar" id="editBar">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  Modo de edição ativo — clique nas etapas para editar. As alterações são salvas automaticamente no navegador.
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">Seções</div>
    <div id="tabList"></div>
    <button class="add-section-btn" id="addSecBtn" onclick="openNewSec()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova seção
    </button>
  </aside>

  <main class="main" id="main"></main>
</div>

<!-- Step Modal -->
<div class="modal-bg" id="modalStep">
  <div class="modal">
    <h3 id="mStepTitle">Etapa</h3>
    <div class="field"><label>Título</label><input id="mTitle" placeholder="Ex: Higienização das formas"></div>
    <div class="field"><label>Descrição</label><textarea id="mBody" placeholder="Descreva o passo a passo..."></textarea></div>
    <div class="field"><label>⚠️ Alerta (opcional)</label><input id="mAlert" placeholder="Ex: Nunca jogar água direto na parte elétrica"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mStepDel" onclick="deleteStep()">Excluir etapa</button>
      <button class="btn btn-cancel" onclick="closeModal('modalStep')">Cancelar</button>
      <button class="btn btn-save" onclick="saveStep()">Salvar</button>
    </div>
  </div>
</div>

<!-- Section Modal -->
<div class="modal-bg" id="modalSec">
  <div class="modal">
    <h3 id="mSecTitle">Seção</h3>
    <div class="field"><label>Nome da seção</label><input id="mSecName" placeholder="Ex: Açougue"></div>
    <div class="field"><label>Descrição</label><input id="mSecDesc" placeholder="Ex: Procedimentos do setor de açougue"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mSecDel" onclick="deleteSec()">Excluir seção</button>
      <button class="btn btn-cancel" onclick="closeModal('modalSec')">Cancelar</button>
      <button class="btn btn-save" onclick="saveSec()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICONS = ['🍞','🛒','✨','🥩','🧃','🥗','🧼','📦','🔧','⭐'];
const DEFAULT = [
  {id:'padaria',name:'Padaria',icon:'🍞',desc:'Siga as etapas em ordem para garantir qualidade e padronização.',steps:[
    {title:'Higienização das formas',body:'Lavar completamente todas as formas antes de iniciar.',alert:''},
    {title:'Organização dos pães',body:'Distribuir os pães (podem estar congelados) nas formas adequadas para cada tipo.',alert:''},
    {title:'Descolagem e fermentação',body:'Colocar em carrinhos de panificação. Ocorre descongelamento e fermentação até atingir o volume ideal.',alert:''},
    {title:'Morifal e corte',body:'Aplicar solução de morifal com água e fazer um corte no topo. Melhora aparência e forma casca crocante.',alert:''},
    {title:'Forneamento',body:'Assar no forno com tempo e temperatura específicos por tipo.\nPão francês: menor tempo.\nPão de queijo: parâmetros diferentes.',alert:''},
    {title:'Retirada e resfriamento',body:'Retirar do forno no tempo determinado e encaminhar para resfriamento antes de expor para venda.',alert:''}
  ]},
  {id:'mercearia',name:'Mercearia',icon:'🛒',desc:'Checklist diário para manter as gôndolas sempre em ordem.',steps:[
    {title:'Conferência de validade',body:'Ao iniciar, verificar a data de validade de todos os produtos. Remover ou sinalizar os próximos do vencimento.',alert:''},
    {title:'Inspeção das gôndolas',body:'Checar espaços vazios, faltas de produto e inconsistências na disposição dos itens.',alert:''},
    {title:'Reposição de mercadorias',body:'Repor os produtos em falta, mantendo as gôndolas sempre abastecidas adequadamente.',alert:''},
    {title:'Método PEPS',body:'Colocar produtos mais antigos na frente e os mais novos atrás para garantir rotatividade do estoque.',alert:''},
    {title:'Organização final',body:'Revisar alinhamento, limpeza e apresentação visual das gôndolas para melhor experiência do cliente.',alert:''}
  ]},
  {id:'higienizacao',name:'Higienização',icon:'✨',desc:'Procedimentos de limpeza por equipamento.',steps:[
    {title:'Estufa de salgados',body:'1. Retirar bandejas\n2. Lavar com água e detergente\n3. Limpar interior com bucha macia\n4. Enxaguar com pano úmido\n5. Secar e recolocar bandejas',alert:'Nunca jogar água direto na parte elétrica. Evitar bucha abrasiva.'},
    {title:'Vitrine refrigerada',body:'1. Desligar da tomada\n2. Retirar produtos e prateleiras\n3. Lavar peças separadamente\n4. Limpar interior (2 passadas)\n5. Secar tudo antes de ligar',alert:'Não jogar água nas saídas de ar. Excesso de água danifica o motor.'},
    {title:'Fatiadora de frios',body:'1. Desligar da tomada\n2. Disco na posição zero\n3. Remover restos com papel toalha\n4. Pano com detergente neutro\n5. Enxaguar e secar\n6. Álcool 70% para finalizar',alert:'Nunca encostar na lâmina diretamente. Limpar após cada uso.'},
    {title:'Máquina de suco',body:'1. Desligar da tomada\n2. Desmontar todas as peças\n3. Lavar peça por peça\n4. Enxaguar, secar e montar\n5. Testar com uma laranja',alert:'Verificar se não ficou bagaço preso. Montar corretamente para não travar.'},
    {title:'Chapa (aquecedor de pão)',body:'1. Desligar e aguardar ficar morna\n2. Remover restos com espátula\n3. Jogar pouca água e esfregar\n4. Empurrar sujeira para coletor\n5. Pano úmido e secar',alert:'Nunca jogar muita água com a chapa quente. Limpar sempre no final do turno.'}
  ]}
];

let data, editMode=false, activeId, editStep={secId:null,idx:null}, editSecId=null;

function load(){
  try{ const r=localStorage.getItem('vm_v2'); data=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT)); }
  catch(e){ data=JSON.parse(JSON.stringify(DEFAULT)); }
  if(!activeId && data.length) activeId=data[0].id;
}
function persist(){
  try{ localStorage.setItem('vm_v2',JSON.stringify(data)); } catch(e){}
  toast('Salvo ✓');
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function render(){ renderSidebar(); renderMain(); }

function renderSidebar(){
  const list=document.getElementById('tabList');
  list.innerHTML='';
  data.forEach(sec=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(sec.id===activeId?' active':'');
    b.innerHTML=`<span class="tab-icon">${sec.icon||'📄'}</span>${sec.name}<span class="tab-edit-btn" title="Editar seção" onclick="event.stopPropagation();openEditSec('${sec.id}')">✎</span>`;
    b.onclick=()=>{ activeId=sec.id; render(); };
    list.appendChild(b);
  });
  document.getElementById('sidebar').className='sidebar'+(editMode?' edit-mode':'');
}

function renderMain(){
  const el=document.getElementById('main');
  el.className='main'+(editMode?' edit-mode':'');
  const sec=data.find(s=>s.id===activeId);
  if(!sec){ el.innerHTML='<div class="empty-state">🗂️<p>Nenhuma seção ainda. Clique em "Editar" e adicione a primeira!</p></div>'; return; }
  let html=`<div class="sec-header"><div><div class="sec-title">${sec.icon||''} ${sec.name}</div><div class="sec-desc">${sec.desc||''}</div></div><button class="edit-sec-btn" onclick="openEditSec('${sec.id}')">✎ Editar seção</button></div>`;
  html+=`<div class="steps-grid">`;
  sec.steps.forEach((s,i)=>{
    const alert=s.alert?`<div class="alert-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${s.alert}</div>`:'';
    html+=`<div class="step-card"><button class="card-edit-btn" onclick="openEditStep('${sec.id}',${i})">✎ editar</button><div class="step-num">${i+1}</div><div class="step-title">${s.title}</div><div class="step-body">${s.body.replace(/\n/g,'<br>')}</div>${alert}</div>`;
  });
  if(sec.steps.length===0 && !editMode) html+=`<div class="empty-state" style="grid-column:1/-1">Nenhuma etapa ainda.</div>`;
  html+=`<button class="add-step-card" onclick="openNewStep('${sec.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nova etapa</button>`;
  html+=`</div>`;
  el.innerHTML=html;
}

function toggleEdit(){
  editMode=!editMode;
  document.getElementById('editToggle').className='edit-toggle'+(editMode?' active':'');
  document.getElementById('editLabel').textContent=editMode?'✅ Sair da edição':'✏️ Editar';
  document.getElementById('editBar').className='edit-bar'+(editMode?' show':'');
  render();
}

/* STEP MODAL */
function openNewStep(secId){
  editStep={secId,idx:null};
  document.getElementById('mTitle').value='';
  document.getElementById('mBody').value='';
  document.getElementById('mAlert').value='';
  document.getElementById('mStepTitle').textContent='Nova etapa';
  document.getElementById('mStepDel').style.display='none';
  document.getElementById('modalStep').classList.add('open');
}
function openEditStep(secId,idx){
  editStep={secId,idx};
  const s=data.find(x=>x.id===secId).steps[idx];
  document.getElementById('mTitle').value=s.title;
  document.getElementById('mBody').value=s.body;
  document.getElementById('mAlert').value=s.alert||'';
  document.getElementById('mStepTitle').textContent='Editar etapa';
  document.getElementById('mStepDel').style.display='block';
  document.getElementById('modalStep').classList.add('open');
}
function saveStep(){
  const sec=data.find(x=>x.id===editStep.secId);
  const step={title:document.getElementById('mTitle').value||'Sem título',body:document.getElementById('mBody').value,alert:document.getElementById('mAlert').value};
  if(editStep.idx===null) sec.steps.push(step);
  else sec.steps[editStep.idx]=step;
  persist(); closeModal('modalStep'); render();
}
function deleteStep(){
  if(!confirm('Excluir esta etapa?')) return;
  data.find(x=>x.id===editStep.secId).steps.splice(editStep.idx,1);
  persist(); closeModal('modalStep'); render();
}

/* SECTION MODAL */
function openNewSec(){
  editSecId=null;
  document.getElementById('mSecName').value='';
  document.getElementById('mSecDesc').value='';
  document.getElementById('mSecTitle').textContent='Nova seção';
  document.getElementById('mSecDel').style.display='none';
  document.getElementById('modalSec').classList.add('open');
}
function openEditSec(id){
  editSecId=id;
  const sec=data.find(x=>x.id===id);
  document.getElementById('mSecName').value=sec.name;
  document.getElementById('mSecDesc').value=sec.desc||'';
  document.getElementById('mSecTitle').textContent='Editar seção';
  document.getElementById('mSecDel').style.display='block';
  document.getElementById('modalSec').classList.add('open');
}
function saveSec(){
  const name=document.getElementById('mSecName').value||'Nova seção';
  const desc=document.getElementById('mSecDesc').value;
  if(editSecId){
    const sec=data.find(x=>x.id===editSecId);
    sec.name=name; sec.desc=desc;
  } else {
    const id='s'+Date.now();
    const icon=ICONS[data.length%ICONS.length];
    data.push({id,name,icon,desc,steps:[]});
    activeId=id;
  }
  persist(); closeModal('modalSec'); render();
}
function deleteSec(){
  if(!confirm('Excluir esta seção e todas as etapas?')) return;
  data=data.filter(x=>x.id!==editSecId);
  if(activeId===editSecId) activeId=data.length?data[0].id:null;
  persist(); closeModal('modalSec'); render();
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// close modal on bg click
document.querySelectorAll('.modal-bg').forEach(bg=>{
  bg.addEventListener('click',e=>{ if(e.target===bg) bg.classList.remove('open'); });
});

load(); render();
</script>
</body>
</html>
